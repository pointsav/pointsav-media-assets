# THEME INJECTION: PointSav Terminal
# Maps PointSav Globals into PointSav Aliases.
theme_name: "PointSav Brutalist Dark"
color_scheme: "dark"
inject:
  canvas: "{pointsav-canvas}"
  card: "{pointsav-card}"
  text: "{pointsav-white}"
  text_muted: "{pointsav-grey-mid}"
  border_heavy: "{pointsav-grey-dark}"
  border_hairline: "{pointsav-white-translucent}"
  accent: "{pointsav-steel}"
  accent_hover: "{pointsav-steel-hover}"
